<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Instructor</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
  

    <body class="layout--sidebar">
  <!-- Re-use the same sidebar -->
  <aside class="sidebar">
    <a class="logo-wrap" href="dashboard.html">
      <img src="../images/Logo.png" alt="YogaTrack Logo" class="logo">
    </a>
    <nav class="nav">
      <div class="nav-dropdown">
        <button class="nav-dropdown-btn">Instructor ▾</button>
        <div class="nav-dropdown-menu">
          <a href="instructor.html">Add New Instructor</a>
          <a href="instructor-search.html">Search/Edit Instructors</a>
        </div>
      </div>

      <div class="nav-dropdown">
        <button class="nav-dropdown-btn">Packages ▾</button>
        <div class="nav-dropdown-menu">
          <a href="package-sale.html">Package Sale</a>
          <a href="package-sales.html">Package Sale Records</a>
          <a href="package-edit.html">Edit Packages</a>
        </div>
      </div>

      <div class="nav-dropdown">
        <button class="nav-dropdown-btn">Customers ▾</button>
        <div class="nav-dropdown-menu">
          <a href="customers.html">Add New Customer</a>
          <a href="customers-search.html">Search/Edit Customer</a>
        </div>
      </div>

      <a href="#">Check-ins</a>
      <a href="../index.html">Log Out</a>
    </nav>
  </aside>

  <!-- Instructor form -->
  <main class="layout--center">
     <div class="instInfoContainer">
            <h1>Enter Instructor Info</h1>
            <form class="card" id="instructorForm">
                <label class="instinfolabel" for="firstName">First:</label>
                <input type="text" id="firstName" name="firstName" required>

                <label class="instinfolabel" for="lastName">Last:</label>
                <input type="text" id="lastName" name="lastName" required>

                <label class="instinfolabel" for="email">Email:</label>
                <input type="email" id="email" name="email" required>

                <label class="instinfolabel" for="phone">Phone Number:</label>
                <input type="tel" id="phone" name="phone" required>

                <label class="instinfolabel" for="address">Address:</label>
                <textarea type="text" id="address" name="address"></textarea>

                <fieldset>
                  <legend>Preferred Contact</legend>
                   <div class="radio-row">
                    <label><input type="radio" name="pref" value="phone">Phone</label>
                    <label><input type="radio" name="pref" value="email">Email</label>
                   </div>
                 </fieldset>

                <button id="instructorsubmit" class="btn" type="submit">Submit</button>
              </form>
        </div>
  </main>

<script src="../js/instructor.js"></script>
<script>
  document.querySelectorAll(".nav-dropdown-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      btn.parentElement.classList.toggle("open");
    });
  });
</script>
</body>
</html>
