<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customers</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  

    <body class="layout--sidebar">
  <!-- Re-use the same sidebar -->
  <aside class="sidebar">
    <a class="logo-wrap" href="dashboard.html">
      <img src="../images/Logo.png" alt="YogaTrack Logo" class="logo">
    </a>
    <nav class="nav">
         <a href="instructor.html">Instructors</a>
        <a href="#">Packages</a>
        <a href="#">Class Schedule</a>
        <a href="customers.html">Customers</a>
        <a href="#">Check-ins</a>
        <a href="../index.html">Log Out</a>
    </nav>
  </aside>

  <!-- Customer form -->
  <main class="layout--center">
    <form class="card" id="customerForm" >
     <div class="customerInfoContainer">
            <h1>Enter Customer Info</h1>
            <form action="/submit-customer-info" method="POST">
                <label class="custinfolabel" for="name">First:</label>
                <input type="text" id="firstinput" name="name" required>
                <label class="custinfolabel" for="name">Last:</label>
                <input type="text" id="lastinput" name="name" required>

                <label class="custinfolabel" for="email">Email:</label>
                <input type="email" id="email" name="email" required>

                <label class="custinfolabel" for="phone">Phone Number:</label>
                <input type="tel" id="phone" name="phone" required>
                <fieldset class="seniorfield">
                    <legend>Select one of the following:</legend>

                    <div>
                        <input class="seniorbtn" required=true type="radio" id="senior" name="option" value="senior" />
                        <label for="senior">I am a senior</label>
                    </div>

                    <div>
                        <input class="seniorbtn" required=true type="radio" id="nonsenior" name="option" value="nonsenior" />
                        <label for="nonsenior">I am not a senior</label>
                    </div>

                </fieldset>
                <button id="customersubmit" class="btn" type="submit">Submit</button>

        </div>
    </form>
  </main>

<script src="../js/customer.js"></script>
</body>
</html>
